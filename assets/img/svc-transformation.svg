<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Transformation: staged steps ascend from current state to a gold target state">
  <!-- TALANTA brand illustration — Transformation: current state to target state -->
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.4" fill="rgba(255,255,255,.06)"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0C2340"/>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- target line -->
  <line x1="70" y1="128" x2="730" y2="128" stroke="rgba(200,169,91,.4)" stroke-width="2.5" stroke-dasharray="6 10"/>

  <!-- ascending stages -->
  <rect x="90"  y="410" width="104" height="70"  fill="#14335C" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
  <rect x="210" y="345" width="104" height="135" fill="#14335C" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
  <rect x="330" y="280" width="104" height="200" fill="#14335C" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
  <rect x="450" y="212" width="104" height="268" fill="#14335C" stroke="rgba(255,255,255,.14)" stroke-width="2"/>
  <rect x="570" y="145" width="120" height="335" fill="#C8A95B"/>

  <!-- ascent path -->
  <path d="M100 392 L194 392 L214 327 L314 327 L334 262 L434 262 L454 194 L554 194 L574 127 L640 127"
        fill="none" stroke="rgba(255,255,255,.85)" stroke-width="4"/>
  <path d="M632 110 L668 127 L632 144 Z" fill="#fff"/>

  <!-- baseline -->
  <line x1="70" y1="480" x2="730" y2="480" stroke="rgba(255,255,255,.35)" stroke-width="3"/>

  <!-- balance signature -->
  <g transform="translate(706,536) scale(0.28)" opacity=".2">
    <path fill="#fff" d="M48 12 L76 82 H67.4 L48 33.6 L28.6 82 H20 Z"/>
    <rect fill="#fff" x="12" y="56" width="72" height="8"/>
  </g>
</svg>
