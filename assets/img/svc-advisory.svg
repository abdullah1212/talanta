<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" role="img" aria-label="Advisory: a path reaches a decision point; one option is chosen with counsel">
  <!-- TALANTA brand illustration — Advisory: counsel at the decision point -->
  <defs>
    <pattern id="dots" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.4" fill="rgba(255,255,255,.06)"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="#0C2340"/>
  <rect width="800" height="600" fill="url(#dots)"/>

  <!-- incoming path -->
  <path d="M70 340 C 200 340, 280 332, 372 316" fill="none" stroke="rgba(255,255,255,.85)" stroke-width="4"/>

  <!-- rejected options: faint, dashed -->
  <path d="M400 308 C 500 270, 570 200, 650 130" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="3" stroke-dasharray="4 10"/>
  <path d="M400 308 C 500 340, 580 420, 655 470" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="3" stroke-dasharray="4 10"/>
  <circle cx="650" cy="130" r="7" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="2.5"/>
  <circle cx="655" cy="470" r="7" fill="none" stroke="rgba(255,255,255,.28)" stroke-width="2.5"/>

  <!-- chosen option: solid gold -->
  <path d="M400 308 C 510 300, 590 270, 668 242" fill="none" stroke="#C8A95B" stroke-width="6"/>
  <path d="M652 226 L692 233 L664 262 Z" fill="#C8A95B"/>

  <!-- the decision point -->
  <circle cx="400" cy="310" r="30" fill="none" stroke="rgba(200,169,91,.4)" stroke-width="2"/>
  <circle cx="400" cy="310" r="15" fill="#C8A95B"/>

  <!-- balance signature -->
  <g transform="translate(706,536) scale(0.28)" opacity=".2">
    <path fill="#fff" d="M48 12 L76 82 H67.4 L48 33.6 L28.6 82 H20 Z"/>
    <rect fill="#fff" x="12" y="56" width="72" height="8"/>
  </g>
</svg>
